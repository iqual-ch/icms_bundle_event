langcode: en
status: true
dependencies:
  config:
    - field.storage.paragraph.field_icms_date
    - search_api.server.database_search
  module:
    - paragraphs
    - paragraphs_blokkli_search_api
id: events_listing
name: 'Events listing'
description: 'Provides an index for the Events listing'
read_only: false
field_settings:
  event_date_end:
    label: 'Event Date (End)'
    datasource_id: 'entity:paragraph'
    property_path: 'field_icms_date:end_value'
    type: date
    dependencies:
      config:
        - field.storage.paragraph.field_icms_date
  event_date_start:
    label: 'Event Date (Start)'
    datasource_id: 'entity:paragraph'
    property_path: 'field_icms_date:value'
    type: date
    dependencies:
      config:
        - field.storage.paragraph.field_icms_date
  field_icms_date:
    label: Date
    datasource_id: 'entity:paragraph'
    property_path: field_icms_date
    type: date
    dependencies:
      config:
        - field.storage.paragraph.field_icms_date
  id:
    label: ID
    datasource_id: 'entity:paragraph'
    property_path: id
    type: integer
    dependencies:
      module:
        - paragraphs
  langcode:
    label: 'Language code'
    datasource_id: 'entity:paragraph'
    property_path: langcode
    type: string
    dependencies:
      module:
        - paragraphs
  parent_id:
    label: 'Parent ID'
    datasource_id: 'entity:paragraph'
    property_path: parent_id
    type: string
    dependencies:
      module:
        - paragraphs
  parent_status:
    label: 'Parent Node Status'
    datasource_id: 'entity:paragraph'
    property_path: parent_status
    type: boolean
    dependencies:
      module:
        - icms_bundle_event_logic
  topics:
    label: Themen
    datasource_id: 'entity:paragraph'
    property_path: field_icms_topics
    type: integer
    dependencies:
      module:
        - icms_bundle_event_logic
datasource_settings:
  'entity:paragraph':
    bundles:
      default: false
      selected:
        - icms_event_occurrence
    languages:
      default: true
      selected: {  }
processor_settings:
  add_url: {  }
  aggregated_field: {  }
  custom_value: {  }
  entity_status: {  }
  entity_type: {  }
  event_occurrence_parent_fields:
    weights:
      add_properties: 0
      preprocess_index: -10
  html_filter:
    weights:
      preprocess_index: -15
      preprocess_query: -15
    all_fields: true
    fields:
      - event_date_end
      - event_date_start
      - langcode
      - parent_id
      - parent_status
      - parent_topics
    title: true
    alt: true
    tags:
      b: 2.0
      em: 1.5
      h1: 5.0
      h2: 3.0
      h3: 2.0
      strong: 2.0
      u: 1.5
  ignorecase:
    weights:
      preprocess_index: -20
      preprocess_query: -20
    all_fields: true
    fields:
      - event_date_end
      - event_date_start
      - langcode
      - parent_id
      - parent_status
      - parent_topics
  language_with_fallback: {  }
  paragraphs_blokkli_search_context: {  }
  paragraphs_blokkli_search_thumbnail: {  }
  rendered_item: {  }
  tokenizer:
    weights:
      preprocess_index: -6
      preprocess_query: -6
    all_fields: true
    fields: {  }
    spaces: ''
    ignored: ._-
    overlap_cjk: 1
    minimum_word_size: '3'
tracker_settings:
  default:
    indexing_order: fifo
options:
  cron_limit: 50
  delete_on_fail: true
  index_directly: true
  track_changes_in_references: true
server: database_search
